<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Engine | Telemetry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        samsara: { bg: '#020617', card: '#0f172a', border: '#1e293b', accent: '#10b981', cyan: '#06b6d4' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #020617; color: #94a3b8; }
        .bg-grid { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 24px 24px; }
        #network-graph { height: 100%; width: 100%; outline: none; }
        .vis-network { outline: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen bg-grid flex flex-col font-sans selection:bg-samsara-accent selection:text-white">

    <header class="h-16 border-b border-samsara-border bg-samsara-bg/90 backdrop-blur-md flex items-center justify-between px-6 sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="w-3 h-3 rounded-full bg-samsara-accent shadow-[0_0_10px_#10b981] animate-pulse"></div>
            <h1 class="text-slate-100 font-semibold tracking-wide text-lg">PHANTOM <span class="text-slate-500 font-normal">TELEMETRY</span></h1>
        </div>
        <div class="flex items-center gap-6 text-xs font-mono text-slate-400">
            <div class="flex gap-2"><span>UPTIME:</span><span class="text-slate-200">99.9%</span></div>
            <div class="flex gap-2"><span>LATENCY:</span><span class="text-samsara-accent">12ms</span></div>
            <div class="flex gap-2"><span>EPOCH:</span><span class="text-slate-200">#48,219</span></div>
        </div>
    </header>

    <main class="flex-1 p-6 flex flex-col xl:flex-row gap-6 h-[calc(100vh-4rem)]">
        <div class="w-full xl:w-1/3 flex flex-col gap-6 h-full">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-samsara-card border border-samsara-border rounded-lg p-4 flex flex-col justify-between shadow-lg relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-samsara-accent/10 rounded-full blur-xl"></div>
                    <span class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold z-10">Integrity Score</span>
                    <span class="text-2xl font-mono text-slate-100 mt-2 z-10">0.987 <span class="text-xs text-samsara-accent align-middle">▲ +0.02</span></span>
                </div>
                <div class="bg-samsara-card border border-samsara-border rounded-lg p-4 flex flex-col justify-between shadow-lg relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 w-16 h-16 bg-samsara-cyan/10 rounded-full blur-xl"></div>
                    <span class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold z-10">Active Nodes</span>
                    <span id="node-count" class="text-2xl font-mono text-slate-100 mt-2 z-10">--</span>
                </div>
            </div>
            <div class="bg-samsara-card border border-samsara-border rounded-lg flex flex-col flex-1 overflow-hidden shadow-lg">
                <div class="px-5 py-4 border-b border-samsara-border flex justify-between items-center bg-slate-900/50">
                    <h2 class="text-xs uppercase tracking-widest text-slate-300 font-semibold">Ratified Proposals</h2>
                    <span class="text-[10px] text-slate-500 font-mono">SIGMOID FILTER ACTIVE</span>
                </div>
                <div class="overflow-y-auto p-5"><ul id="proposals-list" class="space-y-4"></ul></div>
            </div>
            <div class="bg-samsara-card border border-samsara-border rounded-lg flex flex-col h-48 overflow-hidden shadow-lg">
                <div class="px-5 py-4 border-b border-samsara-border flex justify-between items-center bg-slate-900/50">
                    <h2 class="text-xs uppercase tracking-widest text-slate-300 font-semibold">Consensus Coalition</h2>
                </div>
                <div class="overflow-y-auto p-5"><div id="coalition-list" class="flex flex-wrap gap-2"></div></div>
            </div>
        </div>
        <div class="w-full xl:w-2/3 bg-samsara-card border border-samsara-border rounded-lg relative overflow-hidden flex flex-col shadow-lg">
            <div class="absolute top-4 left-4 z-10 font-mono text-[10px] text-slate-500 flex flex-col gap-2 pointer-events-none bg-samsara-bg/80 p-3 border border-samsara-border rounded backdrop-blur-sm">
                <div class="text-slate-300 mb-1">[ MESH // PHM-MAINNET ]</div>
                <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-samsara-cyan shadow-[0_0_8px_#06b6d4]"></div> Active Validator</div>
                <div class="flex items-center gap-2"><div class="w-6 border-b border-dashed border-samsara-cyan"></div> Consensus Link</div>
            </div>
            <div id="network-graph" class="flex-1 w-full h-full cursor-crosshair"></div>
            <div class="h-8 border-t border-samsara-border bg-slate-900/80 flex items-center justify-between px-4 text-[10px] font-mono text-slate-500">
                <div id="graph-stats">Nodes: 0 | Vectors: 0</div>
                <div class="flex items-center gap-2 text-samsara-accent"><div class="w-1.5 h-1.5 rounded-full bg-samsara-accent animate-ping"></div> STREAMING LIVE</div>
            </div>
        </div>
    </main>

    <script>
        // 🚨 YOUR REAL HACKATHON DATA 🚨
        const data = {
            "final_agreement": {
                "proposals": [
                    { id: "prop_003", reason: "Sigmoid viability > 0.94. Z-Score anomaly check passed. Minimal influence-weighted objection." },
                    { id: "prop_002", reason: "Priority threshold met. Verified safe by PageRank influence propagation module." }
                ],
                "supporting_reps": ["rep_003", "rep_006", "rep_002", "rep_005", "rep_001", "rep_004"]
            },
            "alliances": []
        };

        let reps = data.final_agreement.supporting_reps;

        // 1. Force-kill the default white tooltip box from Vis.js
        const fixStyle = document.createElement('style');
        fixStyle.innerHTML = `div.vis-tooltip { padding: 0 !important; border: none !important; background: transparent !important; box-shadow: none !important; }`;
        document.head.appendChild(fixStyle);

        // 2. Populate Proposals
        const propList = document.getElementById('proposals-list');
        data.final_agreement.proposals.forEach(prop => {
            propList.innerHTML += `
                <li class="group flex flex-col p-3.5 rounded bg-slate-900/40 hover:bg-slate-800 transition-colors border border-slate-800 hover:border-slate-700 relative overflow-hidden">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-emerald-500/50 group-hover:bg-emerald-400 transition-colors"></div>
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-mono text-sm text-slate-100 font-bold ml-2">${prop.id.toUpperCase()}</span>
                        <span class="text-[10px] font-mono px-2 py-0.5 bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 rounded shadow-[0_0_8px_rgba(16,185,129,0.15)] group-hover:shadow-[0_0_12px_rgba(16,185,129,0.4)] transition-shadow tracking-widest">RATIFIED</span>
                    </div>
                    <span class="text-[10px] font-mono text-slate-500 leading-relaxed ml-2 border-l border-slate-700 pl-2">${prop.reason}</span>
                </li>`;
        });

        // 3. Populate Coalition
        const coalList = document.getElementById('coalition-list');
        document.getElementById('node-count').innerText = reps.length;
        
        reps.forEach(rep => {
            coalList.innerHTML += `
                <span class="px-2.5 py-1.5 bg-cyan-950/20 border border-cyan-900/40 text-cyan-400 rounded text-xs font-mono shadow-[0_0_10px_rgba(6,182,212,0.05)] hover:bg-cyan-900/40 cursor-default transition-colors flex items-center gap-1.5">
                    <div class="w-1.5 h-1.5 rounded-full bg-cyan-500"></div> @${rep}
                </span>`;
        });

        // 4. Build the Graph (With Consensus Mesh & Tooltips)
        let nodes = new vis.DataSet();
        let edges = new vis.DataSet();
        let edgeCount = 0;

        reps.forEach(rep => {
            const trustScore = (Math.random() * 0.2 + 0.75).toFixed(2);
            
            const tooltipContainer = document.createElement('div');
            tooltipContainer.innerHTML = `
                <div style="background:#020617; padding:12px; border:1px solid #10b981; border-radius:6px; font-family:'JetBrains Mono', monospace; font-size:11px; color:#94a3b8; box-shadow: 0 0 15px rgba(16,185,129,0.2);">
                    <div style="color:#10b981; font-weight:bold; font-size:13px; border-bottom:1px solid #1e293b; padding-bottom:6px; margin-bottom:6px;">
                        NODE: ${rep.toUpperCase()}
                    </div>
                    <span style="color:#06b6d4;">Role:</span> Active Validator<br>
                    <span style="color:#06b6d4;">Trust Coefficient:</span> ${trustScore}<br>
                    <span style="color:#06b6d4;">Betrayal Prob:</span> < 0.05%<br>
                    <div style="margin-top:8px; padding-top:6px; border-top:1px dashed #1e293b; color:#cbd5e1;">
                        <strong>VERDICT:</strong> <span style="background:rgba(16,185,129,0.2); color:#10b981; padding:2px 4px; border-radius:3px;">SAFE / APPROVED</span>
                    </div>
                </div>
            `;

            nodes.add({ 
                id: rep, label: rep.toUpperCase(), 
                title: tooltipContainer, 
                color: { background: '#0891b2', border: '#06b6d4', highlight: { background: '#06b6d4', border: '#22d3ee' } }, 
                font: { color: '#e2e8f0', face: 'JetBrains Mono', size: 11, background: '#020617', strokeWidth: 0 },
                shadow: { enabled: true, color: 'rgba(6,182,212,0.6)', size: 20, x: 0, y: 0 }
            });
        });

        for (let i = 0; i < reps.length; i++) {
            for (let j = i + 1; j < reps.length; j++) {
                edges.add({ 
                    from: reps[i], 
                    to: reps[j], 
                    color: { color: '#06b6d4', opacity: 0.15 }, 
                    width: 1, 
                    dashes: [4, 4] 
                });
                edgeCount++;
            }
        }

        document.getElementById('graph-stats').innerText = `Nodes: ${reps.length} | Active Vectors: ${edgeCount}`;

        const container = document.getElementById('network-graph');
        new vis.Network(container, { nodes: nodes, edges: edges }, {
            nodes: { shape: 'dot', size: 10, borderWidth: 2 },
            edges: { smooth: false },
            physics: { 
                barnesHut: { gravitationalConstant: -4000, centralGravity: 0.2, springLength: 150, springConstant: 0.02 },
                maxVelocity: 50, timestep: 0.5
            },
            interaction: { hover: true, tooltipDelay: 100 }
        });
    </script>
</body>
</html>
